<!DOCTYPE html>
<html lang="sv">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Mapwar studio</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@turf/turf@6/turf.min.js"></script>

<style>
body { margin:0; background:#aad3df; overflow:hidden; font-family:sans-serif; }
#map { height:100vh; width:100vw; background: #1a1a1a; }

#casualties{
position:absolute; top:15px; left:50%; transform:translateX(-50%);
background:rgba(0,0,0,0.85); padding:10px 40px; border-radius:8px;
border:2px solid red; z-index:9999; text-align:center;
color:white; box-shadow: 0 0 20px rgba(255,0,0,0.5);
backdrop-filter: blur(5px);
}

#gui{
position:absolute; top:20px; right:20px; width:340px; height: 90vh; overflow-y: auto;
background:rgba(17,17,17,0.95); padding:20px; border-radius:12px;
border:2px solid #00ff88; z-index:9999; color:white;
box-shadow: 0 0 15px rgba(0,255,136,0.3);
}

/* Scrollbar styling för GUI */
#gui::-webkit-scrollbar { width: 5px; }
#gui::-webkit-scrollbar-thumb { background: #00ff88; border-radius: 10px; }

.country-info {
background:#222; padding:10px; margin:10px 0; border-radius:6px;
border:1px solid #444;
}

.setting-label { font-size: 11px; color: #aaa; text-transform: uppercase; margin-top: 10px; display: block; }

input, select { 
    width:100%; padding:8px; margin-top:5px; background:black; 
    color:white; border:1px solid #444; border-radius: 4px; box-sizing: border-box;
}

button { 
    width:100%; padding:15px; margin-top:10px; font-weight:bold; 
    cursor:pointer; border-radius:5px; border:none; transition: 0.3s;
}

#warBtn { background: #00ff88; color: black; }
#warBtn:hover:not(:disabled) { background: #00cc6e; transform: scale(1.02); }
#warBtn:disabled { background: #333; color: #666; cursor: not-allowed; }

.flag-icon{ border: 1px solid white; box-shadow: 2px 2px 5px rgba(0,0,0,0.7); }

.soldier-text{ 
    font-size:26px; font-weight:bold; color:white; 
    text-shadow: -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
    white-space: nowrap;
}

#war-status {
position:absolute; top:120px; left:50%; transform:translateX(-50%);
background:rgba(0,0,0,0.9); padding:20px 40px; border-radius:6px;
border:2px solid #ff9900; z-index:9999; color:#ff9900;
font-weight:bold; font-size: 24px; text-transform: uppercase;
display:none; text-align: center;
}

@keyframes blink {
    0% { opacity: 1; }
    50% { opacity: 0; fill: #fff; }
    100% { opacity: 1; }
}
.encircled-anim { animation: blink 0.2s 5; }
</style>
</head>

<body>

<div id="casualties">
<div style="font-size: 10px; letter-spacing: 2px;">TOTAL GLOBAL FATALITIES</div>
<div id="totalDeaths" style="font-size: 24px; font-family: monospace;">0</div>
</div>

<div id="war-status"></div>
<div id="map"></div>

<div id="gui">
    <div id="log" style="text-align: center; font-weight: bold; color: #00ff88; letter-spacing: 1px;">STRATEGIC COMMAND</div>

    <div class="country-info" id="attackerInfo" style="display:none;">
        <div style="color:#00ff88; font-weight:bold;">AGGRESSOR: <span id="atkName"></span></div>
        <div class="country-soldiers">Soldiers: <input type="number" id="aSoldiers" value="1000000"></div>
        <div class="country-soldiers">Attack Buff: <input type="number" id="aBuff" value="1.0" step="0.1"></div>
    </div>

    <div class="country-info" id="defenderInfo" style="display:none;">
        <div style="color:#ff4444; font-weight:bold;">DEFENDER: <span id="defName"></span></div>
        <div class="country-soldiers">Soldiers: <input type="number" id="dSoldiers" value="800000"></div>
        <div class="country-soldiers">Defense Buff: <input type="number" id="dBuff" value="1.0" step="0.1"></div>
    </div>

    <div class="country-info">
        <span class="setting-label">Casualty Intensity</span>
        <select id="casualtyRate">
            <option value="0.0002">Low Casualties (Realistic/Long)</option>
            <option value="0.001" selected>Medium Casualties (Standard)</option>
            <option value="0.005">High Casualties (Total War)</option>
        </select>

        <span class="setting-label">War Turn Point (seconds)</span>
        <input type="number" id="turnPoint" value="0" placeholder="0 = disabled">
        
        <span class="setting-label">War Turn Point HALF (seconds)</span>
        <input type="number" id="turnPointHalf" value="0" placeholder="0 = disabled">

        <span class="setting-label">Simulation Speed</span>
        <input type="number" id="warSpeed" value="1.0" step="0.1">
    </div>

    <button id="warBtn" disabled onclick="launchInvasion()">COMMENCE INVASION</button>
    <button id="unselectBtn" onclick="unselectAll()" style="background:#444; color: white;">CANCEL SELECTION</button>
    <button onclick="location.reload()" style="background:#222; color: #888;">REBOOT SYSTEM</button>
    <a href="https://www.tiktok.com/@ufk688" target="_blank">
  <button>Our TikTok</button>
</a>
</div>

<script>
const flags = {
    "Germany": "https://flagcdn.com/w80/de.png", "Poland": "https://flagcdn.com/w80/pl.png",
    "France": "https://flagcdn.com/w80/fr.png", "Sweden": "https://flagcdn.com/w80/se.png",
    "Russia": "https://flagcdn.com/w80/ru.png", "Ukraine": "https://flagcdn.com/w80/ua.png",
    "Norway": "https://flagcdn.com/w80/no.png", "Finland": "https://flagcdn.com/w80/fi.png",
    "United Kingdom": "https://flagcdn.com/w80/gb.png", "Italy": "https://flagcdn.com/w80/it.png",
    "Spain": "https://flagcdn.com/w80/es.png", "Denmark": "https://flagcdn.com/w80/dk.png",
    "Netherlands": "https://flagcdn.com/w80/nl.png", "Belgium": "https://flagcdn.com/w80/be.png",
    "United States": "https://flagcdn.com/w80/us.png", "United States of America": "https://flagcdn.com/w80/us.png",
    "China": "https://flagcdn.com/w80/cn.png", "Japan": "https://flagcdn.com/w80/jp.png"
};

const colors = {
    "Germany": "#121212", "Poland": "#800000", "France": "#001452",
    "Sweden": "#003366", "Russia": "#7a0000", "Ukraine": "#b39700",
    "Norway": "#6b071d", "Finland": "#d1d1d1", "United Kingdom": "#001a57",
    "United States": "#1a1a40", "China": "#8b0000"
};

var map=L.map('map',{zoomControl:false,attributionControl:false}).setView([50,20],4);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Physical_Map/MapServer/tile/{z}/{y}/{x}').addTo(map);

let countries={}, selectedAtk=null, selectedDef=null;
let activeWars = []; 
let globalTotalDeaths = 0;

fetch("https://raw.githubusercontent.com/johan/world.geo.json/master/countries.geo.json")
.then(r=>r.json())
.then(data=>{
    L.geoJSON(data,{
        style:f=>({color:"#fff",weight:1,fillColor:colors[f.properties.name]||"#444",fillOpacity:0.3}),
        onEachFeature:(feature,layer)=>{
            let n=feature.properties.name;
            countries[n]={ feature:feature, layer:layer };
            layer.on("click",()=>{
                let currentOwner = feature.properties.owner || n;
                if(!selectedAtk){
                    selectedAtk=currentOwner;
                    highlightOwner(selectedAtk, "#00ff88");
                    document.getElementById("atkName").textContent=selectedAtk;
                    document.getElementById("attackerInfo").style.display='block';
                } else if(!selectedDef && currentOwner!==selectedAtk){
                    selectedDef=currentOwner;
                    highlightOwner(selectedDef, "red");
                    document.getElementById("defName").textContent=selectedDef;
                    document.getElementById("defenderInfo").style.display='block';
                    document.getElementById("warBtn").disabled=false;
                }
            });
        }
    }).addTo(map);
});

function highlightOwner(ownerName, color) {
    Object.values(countries).forEach(c => {
        let currentOwner = c.feature.properties.owner || c.feature.properties.name;
        if(currentOwner === ownerName) c.layer.setStyle({color: color, weight: 3, fillOpacity: 0.5});
    });
}

function launchInvasion(){
    let id = Date.now();
    let speed = parseFloat(document.getElementById("warSpeed").value) || 1.0;
    let turnPoint = parseInt(document.getElementById("turnPoint").value) || 0;
    let turnPointHalf = parseInt(document.getElementById("turnPointHalf").value) || 0;
    let casualtyRate = parseFloat(document.getElementById("casualtyRate").value);

    let atkFeatures = [];
    Object.values(countries).forEach(c => {
        if((c.feature.properties.owner || c.feature.properties.name) === selectedAtk) atkFeatures.push(c.feature);
    });
    
    let combinedAtkGeom = atkFeatures.length > 1 ? turf.combine(turf.featureCollection(atkFeatures)).features[0] : atkFeatures[0];

    let war = {
        id: id, atkName: selectedAtk, defName: selectedDef,
        atkGeom: combinedAtkGeom, defGeom: countries[selectedDef].feature,
        a: parseInt(document.getElementById("aSoldiers").value),
        d: parseInt(document.getElementById("dSoldiers").value),
        aBuff: parseFloat(document.getElementById("aBuff").value) || 1.0,
        dBuff: parseFloat(document.getElementById("dBuff").value) || 1.0,
        speed: speed, progress: 0.05, casualtyRate: casualtyRate,
        turnPoint: turnPoint, turnPointHalf: turnPointHalf,
        startTime: Date.now(), flagGroup: L.layerGroup().addTo(map),
        occLayer: null, isEnding: false
    };

    war.aLabel=L.marker([0,0],{icon:L.divIcon({html:`<div class="soldier-text" id="mAtk_${id}"></div>`, className: 'dummy', iconSize: [200, 40]})}).addTo(map);
    war.dLabel=L.marker([0,0],{icon:L.divIcon({html:`<div class="soldier-text" id="mDef_${id}" style="color:#ff4444"></div>`, className: 'dummy', iconSize: [200, 40]})}).addTo(map);

    activeWars.push(war);
    unselectAll();
}

function processFront(war){
    if(war.isEnding) return;
    if(war.occLayer) map.removeLayer(war.occLayer);
    war.flagGroup.clearLayers();

    let p1 = turf.center(war.atkGeom);
    let p2 = turf.center(war.defGeom);
    let dist = turf.distance(p1, p2);
    let bearing = turf.bearing(p1, p2);

    let expansionDist = (dist * war.progress * 1.6); 
    let mask = turf.buffer(war.atkGeom, expansionDist, {units:"kilometers"});
    let invasion = turf.intersect(mask, war.defGeom);

    if (invasion) {
        if (turf.area(invasion) / turf.area(war.defGeom) > 0.98) {
            triggerEncirclement(war); return;
        }
        war.occLayer = L.geoJSON(invasion, {
            style: { fillColor: colors[war.atkName] || "#333", fillOpacity: 0.7, color: "#fff", weight: 1 }
        }).addTo(map);

        let invasionLine = turf.polygonToLine(invasion);
        let remaining = turf.difference(war.defGeom, invasion);
        if(!remaining) { triggerEncirclement(war); return; }
        
        let frontPoints = turf.lineIntersect(invasionLine, turf.polygonToLine(remaining));
        if(frontPoints.features.length > 0){
            let coords = frontPoints.features.map(f => f.geometry.coordinates);
            let offset = 0.2;
            let latOffAtk = Math.cos((bearing + 180) * Math.PI / 180) * offset;
            let lngOffAtk = Math.sin((bearing + 180) * Math.PI / 180) * offset;
            let latOffDef = Math.cos(bearing * Math.PI / 180) * offset;
            let lngOffDef = Math.sin(bearing * Math.PI / 180) * offset;

            coords.forEach((c, i) => {
                if(i % 6 === 0){ 
                    if(flags[war.atkName]) L.marker([c[1]+latOffAtk, c[0]+lngOffAtk],{icon:L.icon({iconUrl:flags[war.atkName],iconSize:[24,16],className:'flag-icon'})}).addTo(war.flagGroup);
                    if(flags[war.defName]) L.marker([c[1]+latOffDef, c[0]+lngOffDef],{icon:L.icon({iconUrl:flags[war.defName],iconSize:[24,16],className:'flag-icon'})}).addTo(war.flagGroup);
                }
            });
            let mid = coords[Math.floor(coords.length/2)];
            war.aLabel.setLatLng([mid[1]+latOffAtk*3, mid[0]+lngOffAtk*3]);
            war.dLabel.setLatLng([mid[1]+latOffDef*3, mid[0]+lngOffDef*3]);
        }
    }
    document.getElementById("mAtk_"+war.id).innerText=Math.floor(war.a).toLocaleString();
    document.getElementById("mDef_"+war.id).innerText=Math.floor(war.d).toLocaleString();
}

setInterval(()=>{
    activeWars.forEach((war, index) => {
        if(war.isEnding) return;

        let elapsed = (Date.now() - war.startTime) / 1000;
        
        // Logik för Turn Points
        let pushPower = 1.0;
        if(war.turnPoint > 0 && elapsed > war.turnPoint) {
            pushPower = -1.5; // Försvararen trycker tillbaka hårt
        } else if(war.turnPointHalf > 0 && elapsed > war.turnPointHalf) {
            // "HALF" logik: Försvararen trycker tillbaka ett tag, sen vänder det igen
            if (elapsed < war.turnPointHalf * 1.5) pushPower = -0.8; 
            else pushPower = 1.2;
        }

        // Realistiska förluster baserat på arméstorlek
        let lossFactor = war.casualtyRate * war.speed;
        let aLoss = (war.a * lossFactor * (1/war.aBuff)) + (Math.random() * 500);
        let dLoss = (war.d * lossFactor * (1/war.dBuff)) + (Math.random() * 500);
        
        war.a -= aLoss; war.d -= dLoss;
        globalTotalDeaths += (aLoss + dLoss);
        document.getElementById("totalDeaths").innerText = Math.floor(globalTotalDeaths).toLocaleString();

        let powerRatio = (war.a * war.aBuff) / ((war.d * war.dBuff) + 1);
        war.progress += (0.005 * powerRatio * pushPower) * war.speed;
        
        // Säkerställ att progress inte blir negativ eller för hög utanför gränserna
        if(war.progress < 0.01) war.progress = 0.01;

        processFront(war);

        if(war.a <= 0 || war.d <= 0 || war.progress > 1.2){
            triggerEncirclement(war);
        }
    });
}, 100);

function triggerEncirclement(war) {
    if(war.isEnding) return;
    war.isEnding = true;
    let trapped = Math.floor(war.d);
    countries[war.defName].layer.getElement().classList.add('encircled-anim');
    let ws = document.getElementById("war-status");
    ws.innerHTML = `FRONT COLLAPSED!<br>${war.defName} HAS FALLEN<br><span style="font-size:14px; color:white;">${trapped > 0 ? trapped.toLocaleString() : 0} POWs TAKEN</span>`;
    ws.style.display='block';
    setTimeout(() => {
        capitulate(war, activeWars.indexOf(war));
        ws.style.display='none';
    }, 1500);
}

function capitulate(war, index){
    if(index === -1) return;
    let winner = (war.a > war.d) ? war.atkName : war.defName;
    let loser = (winner === war.atkName) ? war.defName : war.atkName;
    countries[loser].feature.properties.owner = winner;
    countries[loser].layer.setStyle({fillColor:colors[winner]||"#222", fillOpacity:0.8, weight: 2});
    if(war.occLayer) map.removeLayer(war.occLayer);
    war.flagGroup.clearLayers();
    map.removeLayer(war.aLabel); map.removeLayer(war.dLabel);
    activeWars.splice(index, 1);
}

function unselectAll(){
    selectedAtk=null; selectedDef=null;
    Object.values(countries).forEach(c=>{
        let owner = c.feature.properties.owner || c.feature.properties.name;
        c.layer.setStyle({color:"#fff",weight:1,fillColor:colors[owner]||"#444",fillOpacity:0.3});
    });
    document.getElementById("warBtn").disabled=true;
    document.getElementById("attackerInfo").style.display='none';
    document.getElementById("defenderInfo").style.display='none';
}
</script>
</body>
</html>
